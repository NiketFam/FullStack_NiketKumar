<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Portal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .box:hover:hover {
            background-color: bisque;
            cursor: pointer;
        }
        .navbar:hover{
            background-image:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),url(https://picsum.photos/200/300);
        }
      </style>
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <h2>JobPortal</h2>
        <nav>
            <a href="#">Home</a>
            <a href="#">Jobs</a>
            <a href="#">Companies</a>
            <a href="#">Login</a>
        </nav>
    </header>

    <!-- Search Section -->
    <section class="search">
        <input type="text" placeholder="Job title or keyword">
        <input type="text" placeholder="Location">
        <button>Search Jobs</button>
    </section>

    <!-- Categories -->
    <section class="categories">
        <div class="box">IT Jobs</div>
        <div class="box">Government</div>
        <div class="box">Marketing</div>
        <div class="box">Internships</div>
    </section>

    <!-- Job Listings -->
    <section class="jobs">
        <div class="job-card">
            <h3>Frontend Developer</h3>
            <p>Company: Infosys</p>
            <p>Location: Bangalore</p>
        </div>
        <div class="job-card">
            <h3>Backend Developer</h3>
            <p>Company: TCS</p>
            <p>Location: Pune</p>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 Job Portal | All Rights Reserved</p>
    </footer>

</body>
</html>
